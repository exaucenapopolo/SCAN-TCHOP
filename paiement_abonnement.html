<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCAN&TCHOP – Paiement Sécurisé</title>

  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ====== VARIABLES ====== */
    :root {
      --primary: #e67e22;
      --primary-hover: #cf6f1b;
      --primary-light: #fef3e8;
      --bg-color: #fdf8f4;
      --text-main: #0b1a2e;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.96);
      --border-color: #e2e8f0;
      --success: #22c55e;
      --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 50px rgba(230,126,34,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1, h2 { font-family: 'Playfair Display', serif; }

    /* ====== HEADER ====== */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    .brand img { height: 50px; border-radius: 12px; box-shadow: var(--shadow-md); }
    .brand span { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }

    /* ====== CONTAINER PRINCIPAL ====== */
    .payment-container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ====== RÉSUMÉ DE COMMANDE ====== */
    .order-summary {
      background: linear-gradient(135deg, var(--primary-light), #fffdf9);
      padding: 35px 30px;
      border-bottom: 1px solid var(--border-color);
      text-align: center;
    }
    .order-summary h2 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; }
    .price-display { font-size: 2.5rem; font-weight: 800; color: var(--text-main); font-family: 'Inter', sans-serif;}
    .price-display span { font-size: 1rem; color: var(--text-muted); font-weight: 500; display: block; margin-top: 5px; }

    /* ====== CHOIX DE LA DURÉE ====== */
    .duration-container { padding: 25px 30px 0 30px; }
    .duration-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; color: var(--text-main); }
    .duration-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .duration-btn {
      padding: 12px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
      background: #fff;
    }
    .duration-btn:hover { border-color: var(--primary-hover); color: var(--primary-hover); }
    .duration-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(230,126,34,0.3);
    }

    /* ====== FORMULAIRE ====== */
    .payment-form { padding: 25px 30px 30px 30px; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; color: #1e293b; }
    .form-control {
      width: 100%; padding: 16px 18px; border: 2px solid var(--border-color); border-radius: 14px;
      font-family: inherit; font-size: 1rem; background: #fff; transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(230,126,34,0.1); }

    .payment-methods { display: flex; gap: 15px; margin-bottom: 25px; }
    .method-btn {
      flex: 1; padding: 16px; border: 2px solid var(--primary); border-radius: 14px;
      background: var(--primary-light); cursor: default; font-weight: 700; 
      display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--primary);
    }
    .method-btn i { font-size: 1.8rem; }

    /* ====== BOUTONS ====== */
    .btn {
      padding: 16px 24px; border: none; border-radius: 14px; font-weight: 700; font-size: 1.1rem;
      cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: #fff; box-shadow: 0 4px 20px rgba(230,126,34,0.3); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(230,126,34,0.4); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .back-link {
      margin-top: 25px; color: var(--text-muted); text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 8px; transition: var(--transition);
    }
    .back-link:hover { color: var(--primary); transform: translateX(-5px); }
  </style>
</head>
<body>

  <div class="brand">
    <img src="https://raw.githubusercontent.com/exaucenapopolo/SCAN-TCHOP/refs/heads/main/Images/Logos/logo%20scan%26tchop.png" alt="logo SCAN&TCHOP" />
    <span>SCAN&TCHOP</span>
  </div>

  <div class="payment-container">
    <div class="order-summary">
      <h2 id="planNameDisplay">Chargement...</h2>
      <div class="price-display" id="planPriceDisplay">0 FCFA <span>...</span></div>
    </div>

    <!-- Section dynamique pour choisir la durée -->
    <div class="duration-container" id="durationContainer" style="display: none;">
      <div class="duration-title">Sélectionnez la durée de votre abonnement :</div>
      <div class="duration-grid">
        <div class="duration-btn active" data-months="1">1 Mois</div>
        <div class="duration-btn" data-months="3">3 Mois</div>
        <div class="duration-btn" data-months="6">6 Mois</div>
        <div class="duration-btn" data-months="12">1 An</div>
      </div>
    </div>

    <div class="payment-form">
      <div class="payment-methods">
        <div class="method-btn">
          <i class="fas fa-mobile-alt"></i>
          Mobile Money sécurisé
        </div>
      </div>

      <form id="checkoutForm">
        <div class="form-group">
          <label>Numéro de téléphone (Mobile Money)</label>
          <input type="tel" id="paymentInput" class="form-control" placeholder="Ex: 6XXXXXXXX" required />
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <i class="fas fa-lock"></i> Payer <span id="btnPriceAmount"></span>
        </button>
      </form>
    </div>
  </div>

  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Annuler et retourner</a>

  <script>
    // Configuration des plans (URL attendue : ?plan=Starter ou ?plan=Cle-en-main etc.)
    const planConfig = {
      'Starter': { price: 11900, type: 'mensuel', label: 'Pack Starter' },
      'Pro': { price: 14900, type: 'mensuel', label: 'Pack Pro' },
      'Premium': { price: 29900, type: 'mensuel', label: 'Pack Premium' },
      'Cle-en-main': { price: 34900, type: 'unique', label: 'Pack Clé en main' },
      'A-vie': { price: 499000, type: 'unique', label: 'Pack À vie' }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const planKey = urlParams.get('plan');
    const restoId = urlParams.get('restoId');

    let currentPlan = planConfig[planKey];
    let selectedMonths = 1; 

    // Initialisation de la page
    if (currentPlan && restoId) {
      document.getElementById('planNameDisplay').textContent = currentPlan.label;
      
      // Afficher le sélecteur de durée uniquement pour les abonnements mensuels
      if (currentPlan.type === 'mensuel') {
        document.getElementById('durationContainer').style.display = 'block';
      } else {
        // Pour les offres uniques (Clé en main / À vie)
        selectedMonths = (planKey === 'Cle-en-main') ? 'Cle_en_main' : 'A_vie';
      }

      updatePriceDisplay();
    } else {
      alert("Erreur : Les informations du pack sont incomplètes ou invalides.");
      window.location.href = 'index.html';
    }

    // Gestion des clics sur les boutons de durée
    const durationBtns = document.querySelectorAll('.duration-btn');
    durationBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Retirer la classe active de tous
        durationBtns.forEach(b => b.classList.remove('active'));
        // Ajouter à celui cliqué
        e.target.classList.add('active');
        // Mettre à jour la variable
        selectedMonths = parseInt(e.target.getAttribute('data-months'));
        updatePriceDisplay();
      });
    });

    // Fonction pour mettre à jour l'affichage du prix total
    function updatePriceDisplay() {
      let total = currentPlan.price;
      let textDuree = "Paiement unique";

      if (currentPlan.type === 'mensuel') {
        total = currentPlan.price * selectedMonths;
        textDuree = selectedMonths === 1 ? "pour 1 mois" : `pour ${selectedMonths} mois`;
      }

      // Formatage du prix (ex: 35 700)
      const formattedTotal = total.toLocaleString('fr-FR');
      
      document.getElementById('planPriceDisplay').innerHTML = `${formattedTotal} FCFA <span>${textDuree}</span>`;
      document.getElementById('btnPriceAmount').textContent = `(${formattedTotal} FCFA)`;
    }

    // Soumission du formulaire
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création du paiement...';

      const phone = document.getElementById('paymentInput').value;
      
      // Calcul du montant final à envoyer
      let finalAmount = currentPlan.price;
      if (currentPlan.type === 'mensuel') {
        finalAmount = currentPlan.price * selectedMonths;
      }

      const redirectUrl = window.location.origin + '/index.html'; 

      try {
        const response = await fetch('/api/create-subscription-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            planName: planKey,
            restoId: restoId,
            amount: finalAmount,
            phone: phone,
            redirectUrl: redirectUrl,
            duration: selectedMonths.toString() // On envoie la durée au backend (ex: "3" ou "A_vie")
          })
        });

        const data = await response.json();

        if (data.success && data.checkoutUrl) {
          window.location.href = data.checkoutUrl;
        } else {
          throw new Error(data.error || 'Erreur lors de l\'initialisation.');
        }

      } catch (error) {
        console.error("Erreur:", error);
        alert("Erreur de paiement : " + error.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-lock"></i> Payer <span id="btnPriceAmount">(${finalAmount.toLocaleString('fr-FR')} FCFA)</span>`;
      }
    });
  </script>
</body>
</html>
