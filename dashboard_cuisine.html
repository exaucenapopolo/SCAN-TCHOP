<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Feed Cuisine - SCAN&TCHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #121212; --card-bg: #1E1E1E; --text-light: #F3F4F6; --accent: #F59E0B; --danger: #EF4444; --success: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-light); padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .top-bar h1 { color: var(--accent); font-size: 2rem; }
        .time { font-size: 1.5rem; font-weight: bold; }
        .tickets-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; }
        .ticket { background: var(--card-bg); width: 300px; flex-shrink: 0; border-radius: 12px; border-top: 6px solid var(--danger); display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .ticket.urgent { border-top-color: var(--danger); animation: blink 2s infinite; }
        .ticket.normal { border-top-color: var(--accent); }
        .ticket-header { padding: 15px; border-bottom: 1px dashed #444; display: flex; justify-content: space-between; }
        .table-no { font-size: 1.8rem; font-weight: 700; color: white; }
        .timer { font-size: 1.1rem; color: #9CA3AF; }
        .ticket-body { padding: 15px; flex-grow: 1; }
        .item { margin-bottom: 15px; font-size: 1.2rem; display: flex; gap: 10px; }
        .qty { font-weight: bold; color: var(--accent); }
        .notes { font-size: 0.9rem; color: #9CA3AF; margin-left: 25px; font-style: italic; }
        .ticket-footer { padding: 15px; }
        .btn-ready { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        @keyframes blink { 0% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); } 50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); } 100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>ÉCRAN CUISINE - Live Feed</h1>
        <div class="time" id="clock">12:11:00</div>
        <a href="connexion-v2.html" style="color: #9CA3AF; text-decoration: none;">Quitter</a>
    </div>

    <audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div class="tickets-container">
        <div class="ticket urgent">
            <div class="ticket-header">
                <div class="table-no">Table 4</div>
                <div class="timer" style="color: var(--danger);">12 min</div>
            </div>
            <div class="ticket-body">
                <div class="item"><span class="qty">2x</span><span>Poulet DG</span></div>
                <div class="notes">- Sans piment pour l'un</div>
                <div class="item"><span class="qty">1x</span><span>Ndolé Crevettes</span></div>
            </div>
            <div class="ticket-footer">
                <button class="btn-ready" onclick="markReady(this)">✔ Marquer Prêt</button>
            </div>
        </div>

        <div class="ticket normal">
            <div class="ticket-header">
                <div class="table-no">Table 12</div>
                <div class="timer">3 min</div>
            </div>
            <div class="ticket-body">
                <div class="item"><span class="qty">1x</span><span>Poisson Braisé</span></div>
                <div class="notes">- Accompagnement : Miondo</div>
            </div>
            <div class="ticket-footer">
                <button class="btn-ready" onclick="markReady(this)">✔ Marquer Prêt</button>
            </div>
        </div>
    </div>

    <script>
        // Met à jour l'heure de la cuisine
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR');
        }, 1000);

        // Retire le ticket quand le plat est prêt
        function markReady(btn) {
            const ticket = btn.closest('.ticket');
            ticket.style.opacity = '0.5';
            btn.innerText = "Envoyé en salle";
            btn.style.background = "#4B5563";
            setTimeout(() => { ticket.remove(); }, 1000);
        }

        // Joue le son au chargement (il faut parfois un premier clic de l'utilisateur sur Chrome)
        window.onload = () => {
            document.body.addEventListener('click', () => {
                document.getElementById('bell').play().catch(e => console.log('Audio error:', e));
            }, {once:true});
        };
    </script>
</body>
</html>
