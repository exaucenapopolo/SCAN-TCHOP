<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - SCAN&TCHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS optimisé pour la rapidité et la fluidité */
        :root { 
            --primary: #E67E22; 
            --primary-hover: #cf6f1b; 
            --bg-body: #F4F7F6; 
            --text-main: #2D3748; 
            --text-muted: #718096;
            --border-light: #E2E8F0; 
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
        }
        .auth-container { 
            background: var(--white); padding: 40px; border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; 
            text-align: center; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-container img { height: 50px; margin-bottom: 20px; }
        .auth-container h2 { font-size: 1.5rem; margin-bottom: 5px; color: #1A202C; }
        .auth-container p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.85rem; }
        .form-control { 
            width: 100%; padding: 10px 15px; border: 1px solid var(--border-light); 
            border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .btn { 
            width: 100%; padding: 12px; background-color: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .toggle-link { margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; }
        .toggle-link span { color: var(--primary); font-weight: 600; }
        .hidden { display: none; }
        .error-message { color: #E53E3E; font-size: 0.85rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Remplacer par ton vrai logo -->
        <img src="https://raw.githubusercontent.com/exaucenapopolo/SCAN-TCHOP/refs/heads/main/Images/Logos/logo%20scan%26tchop.png" alt="Logo SCAN&TCHOP">
        
        <!-- SECTION CONNEXION -->
        <div id="login-section">
            <h2>Connexion</h2>
            <p>Accédez à votre espace restaurant</p>
            <div id="login-error" class="error-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn" id="login-btn">Se connecter</button>
            </form>
            <p class="toggle-link" onclick="toggleForm()">Nouveau ? <span>S'inscrire</span></p>
        </div>

        <!-- SECTION INSCRIPTION -->
        <div id="register-section" class="hidden">
            <h2>Créer un compte</h2>
            <p>Simple et rapide, configurez votre restaurant plus tard.</p>
            <div id="register-error" class="error-message"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email du propriétaire</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <!-- Suppression du champ Nom du Restaurant ici -->
                <button type="submit" class="btn" id="register-btn">S'inscrire</button>
            </form>
            <p class="toggle-link" onclick="toggleForm()">Déjà un compte ? <span>Se connecter</span></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqXjfE2wKJQCFVLs2SPngHz_IL7-csO34",
            authDomain: "scan-et-tchop.firebaseapp.com",
            projectId: "scan-et-tchop",
            storageBucket: "scan-et-tchop.firebasestorage.app",
            messagingSenderId: "648843762360",
            appId: "1:648843762360:web:092b3d359eeae61ef2324d",
            measurementId: "G-8DKXS67DKY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // INSCRIPTION
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.innerText = "Création...";
            try {
                const userCred = await createUserWithEmailAndPassword(auth, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
                // On sauvegarde dans la base de données sans le nom du restaurant
                await setDoc(doc(db, "users", userCred.user.uid), {
                    email: userCred.user.email,
                    role: "proprietaire",
                    restaurantName: "", // Sera configuré dans le dashboard
                    isConfigured: false,
                    createdAt: new Date()
                });
                window.location.href = 'dashboard_proprietaire.html';
            } catch (error) {
                document.getElementById('register-error').innerText = "Erreur: " + error.message;
                document.getElementById('register-error').style.display = 'block';
                btn.innerText = "S'inscrire";
            }
        });

        // CONNEXION
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerText = "Connexion...";
            try {
                const userCred = await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
                const docSnap = await getDoc(doc(db, "users", userCred.user.uid));
                
                if (docSnap.exists()) {
                    const role = docSnap.data().role;
                    if(role === 'proprietaire') window.location.href = 'dashboard_proprietaire.html';
                    else window.location.href = `dashboard_${role}.html`; // Gère dynamiquement les autres rôles
                }
            } catch (error) {
                document.getElementById('login-error').innerText = "Identifiants incorrects.";
                document.getElementById('login-error').style.display = 'block';
                btn.innerText = "Se connecter";
            }
        });
    </script>
</body>
</html>
