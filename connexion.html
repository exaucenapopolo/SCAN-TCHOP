<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SCAN&TCHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E67E22; --primary-hover: #cf6f1b; --bg-body: #FAFAFA; --text-main: #2D3748; --border-light: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .login-container img { height: 50px; margin-bottom: 20px; }
        .login-container h2 { margin-bottom: 5px; color: #1A202C; }
        .login-container p { color: #718096; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-light); border-radius: 6px; font-family: inherit; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1); }
        .btn { display: inline-block; width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: var(--primary-hover); }
        .back-link { display: inline-block; margin-top: 20px; font-size: 0.9rem; color: var(--primary); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://raw.githubusercontent.com/exaucenapopolo/SCAN-TCHOP/refs/heads/main/Images/Logos/logo%20scan%26tchop.png" alt="Logo SCAN&TCHOP">
        <h2>Espace Gérant</h2>
        <p>Connectez-vous à votre tableau de bord</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="role">Votre Rôle</label>
                <select id="role" class="form-control" required>
                    <option value="proprietaire">Propriétaire / Gérant</option>
                    <option value="serveur">Serveur</option>
                    <option value="cuisine">Cuisine</option>
                    <option value="comptable">Comptable</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">Identifiant / Email</label>
                <input type="email" id="email" class="form-control" placeholder="exemple@restaurant.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
        <a href="index.html" class="back-link">&larr; Retour à l'accueil</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Ici, tu pourras plus tard ajouter le code pour te connecter à ta base de données
            alert("Connexion réussie ! Redirection vers le tableau de bord...");
            window.location.href = 'index.html'; // Redirection temporaire
        });
    </script>
</body>
</html>
