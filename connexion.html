<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion & Inscription - SCAN&TCHOP</title>

    <!-- Google Fonts : Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ====== VARIABLES & RESET (Inspiré du Dashboard Premium) ====== */
        :root {
            --primary: #e67e22;
            --primary-hover: #cf6f1b;
            --primary-light: #fef3e8;
            --bg-color: #fdf8f4;
            --text-main: #0b1a2e;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            --shadow-lg: 0 25px 50px -12px rgba(230, 126, 34, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* ====== CONTENEUR D'AUTHENTIFICATION ====== */
        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-container img {
            height: 55px;
            display: block;
            margin: 0 auto 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .auth-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .auth-container > p {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-section { transition: opacity 0.3s ease; }
        .hidden { display: none; }

        /* ====== SÉLECTEUR DE RÔLE ====== */
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 16px;
        }
        
        .role-selector button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .role-selector button.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* ====== FORMULAIRES ====== */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
            transition: var(--transition);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(230, 126, 34, 0.12);
        }

        .field-code { display: none; }
        .field-code.visible { display: block; animation: fadeUp 0.3s ease; }

        /* ====== BOUTONS ====== */
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(230,126,34,0.25);
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230,126,34,0.35);
        }

        .btn:active { transform: scale(0.97); }

        .btn-google {
            background: #fff;
            color: var(--text-main);
            border: 1.5px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .btn .spinner { display: none; }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { display: none; }

        /* ====== SÉPARATEUR ====== */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1.5px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* ====== LIENS ALTERNATIFS ====== */
        .toggle-link {
            display: block;
            margin-top: 24px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .toggle-link span {
            color: var(--primary);
            font-weight: 700;
            transition: var(--transition);
        }
        .toggle-link:hover span { text-decoration: underline; }

        /* ====== TOAST NOTIFICATIONS (Premium) ====== */
        #toastContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .toast {
            background: #fff;
            border-left: 5px solid;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            color: var(--text-main);
            pointer-events: auto;
            animation: toastSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div class="auth-container">
        <img src="https://raw.githubusercontent.com/exaucenapopolo/SCAN-TCHOP/refs/heads/main/Images/Logos/logo%20scan%26tchop.png" alt="SCAN&TCHOP" />

        <!-- ================= SECTION CONNEXION ================= -->
        <div id="login-section" class="form-section">
            <h2>Bon retour !</h2>
            <p>Connectez-vous à votre espace de travail</p>

            <!-- Sélecteur de rôle -->
            <div class="role-selector">
                <button id="role-proprietaire" class="active"><i class="fas fa-store"></i> Propriétaire</button>
                <button id="role-employe"><i class="fas fa-user-tie"></i> Employé</button>
            </div>

            <!-- Conteneur Google -->
            <div id="google-auth-container">
                <button type="button" class="btn btn-google" onclick="window.handleGoogleAuth()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px; margin: 0; box-shadow: none; border-radius: 0;" />
                    <span class="btn-text">Continuer avec Google</span>
                    <span class="spinner"><i class="fas fa-spinner fa-pulse"></i></span>
                </button>
                <div class="divider" id="auth-divider">ou avec vos identifiants</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="login-email">Adresse Email</label>
                    <input type="email" id="login-email" class="form-control" placeholder="exemple@restaurant.com" required />
                </div>
                
                <!-- Champ Code Restaurant -->
                <div class="form-group field-code" id="code-group">
                    <label for="login-code">Code d'accès Restaurant</label>
                    <input type="text" id="login-code" class="form-control" placeholder="Ex: ABCD1234" />
                </div>
                
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
                </div>
                
                <button type="submit" class="btn" id="login-btn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Se connecter</span>
                    <span class="spinner"><i class="fas fa-spinner fa-pulse"></i></span>
                </button>
            </form>

            <p class="toggle-link" onclick="window.toggleForm()">Nouveau partenaire ? <span>Créer mon restaurant</span></p>
        </div>

        <!-- ================= SECTION INSCRIPTION ================= -->
        <div id="register-section" class="form-section hidden">
            <h2>Créer votre restaurant</h2>
            <p>Rejoignez SCAN&TCHOP en quelques clics</p>
            
            <!-- Inscription Google -->
            <button type="button" class="btn btn-google" onclick="window.handleGoogleAuth()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px; height: 20px; margin: 0; box-shadow: none; border-radius: 0;" />
                <span class="btn-text">S'inscrire avec Google</span>
                <span class="spinner"><i class="fas fa-spinner fa-pulse"></i></span>
            </button>
            <div class="divider">ou utiliser un email</div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-email">Email du propriétaire</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="proprietaire@email.com" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe sécurisé</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min. 8 caractères" required />
                </div>
                <button type="submit" class="btn" id="register-btn">
                    <span class="btn-text"><i class="fas fa-user-plus"></i> Créer mon compte</span>
                    <span class="spinner"><i class="fas fa-spinner fa-pulse"></i></span>
                </button>
            </form>
            
            <p class="toggle-link" onclick="window.toggleForm()">Déjà partenaire ? <span>Me connecter</span></p>
        </div>
    </div>

    <!-- NOUVEAU SCRIPT FIREBASE MODULAIRE -->
    <script type="module">
        // Importation des bibliothèques Firebase (Version 12)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Ta nouvelle configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDpvdfugex1MtpC6jOyTOIyZzY2kgcgHnk",
            authDomain: "cinexau-903a6.firebaseapp.com",
            projectId: "cinexau-903a6",
            storageBucket: "cinexau-903a6.firebasestorage.app",
            messagingSenderId: "247230931008",
            appId: "1:247230931008:web:44961cc4857a567a31ffa5",
            measurementId: "G-SV1HQY5MW6"
        };

        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ================= SYSTÈME DE TOAST =================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6' };
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            
            toast.className = 'toast';
            toast.style.borderColor = colors[type];
            toast.innerHTML = `<i class="fas ${icons[type]}" style="color:${colors[type]};font-size:1.4rem;"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // ================= REDIRECTION DYNAMIQUE SELON LE RÔLE =================
        function getDashboardUrl(role) {
            // Normaliser le rôle (minuscules, sans accents)
            const roleLower = role ? role.toLowerCase().trim() : '';
            switch (roleLower) {
                case 'proprietaire':
                    return 'dashboard_proprietaire.html';
                case 'cuisine':
                    return 'dashboard_cuisine.html';
                case 'serveur':
                    return 'dashboard_serveur.html';
                // Ajoutez d'autres rôles ici (ex: 'comptable' -> 'dashboard_comptable.html')
                default:
                    // Fallback : dashboard_employe.html pour tout autre rôle
                    return 'dashboard_employe.html';
            }
        }

        // ================= ÉLÉMENTS DU DOM =================
        const loginSection = document.getElementById('login-section');
        const registerSection = document.getElementById('register-section');
        const roleProprietaire = document.getElementById('role-proprietaire');
        const roleEmploye = document.getElementById('role-employe');
        const codeGroup = document.getElementById('code-group');
        const googleAuthContainer = document.getElementById('google-auth-container');
        const authDivider = document.getElementById('auth-divider');

        // ================= BASCULE INSCRIPTION / CONNEXION =================
        window.toggleForm = function() {
            loginSection.classList.toggle('hidden');
            registerSection.classList.toggle('hidden');
        };

        // ================= GESTION DES RÔLES (UI & Sécurité) =================
        roleProprietaire.addEventListener('click', () => {
            roleProprietaire.classList.add('active');
            roleEmploye.classList.remove('active');
            
            codeGroup.classList.remove('visible');
            document.getElementById('login-code').required = false;
            
            googleAuthContainer.style.display = 'block';
            authDivider.style.display = 'flex';
        });

        roleEmploye.addEventListener('click', () => {
            roleEmploye.classList.add('active');
            roleProprietaire.classList.remove('active');
            
            codeGroup.classList.add('visible');
            document.getElementById('login-code').required = true;
            
            googleAuthContainer.style.display = 'none';
            authDivider.style.display = 'none';
        });

        // ================= AUTHENTIFICATION GOOGLE =================
        window.handleGoogleAuth = async function() {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Vérifier si cet utilisateur existe dans Firestore
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // Nouvel utilisateur Google -> on le crée en tant que propriétaire
                    await setDoc(userRef, {
                        email: user.email,
                        nom: user.displayName || '',
                        photo: user.photoURL || '',
                        role: 'proprietaire',
                        createdAt: serverTimestamp()
                    });
                    showToast("Création du compte réussie !", "success");
                    // Redirection vers le dashboard propriétaire
                    window.location.href = getDashboardUrl('proprietaire');
                } else {
                    const data = userSnap.data();
                    // Google Auth réservé aux propriétaires
                    if (data.role !== 'proprietaire') {
                        await signOut(auth);
                        showToast("Accès refusé. Les employés doivent se connecter avec Email, Mot de passe et Code.", "error");
                        return;
                    }
                    showToast("Connexion réussie !", "success");
                    window.location.href = getDashboardUrl(data.role);
                }
            } catch (error) {
                showToast("Erreur Google : " + error.message, "error");
            }
        };

        // ================= INSCRIPTION PAR EMAIL (Propriétaire) =================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('register-btn');
            
            btn.classList.add('loading');

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    role: 'proprietaire',
                    createdAt: serverTimestamp()
                });
                
                showToast("Restaurant créé avec succès !", "success");
                // Redirection vers dashboard propriétaire
                window.location.href = getDashboardUrl('proprietaire');
            } catch (err) {
                showToast(err.message, "error");
            } finally {
                btn.classList.remove('loading');
            }
        });

        // ================= CONNEXION PAR EMAIL (Propriétaire & Employé) =================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const code = document.getElementById('login-code').value.trim();
            const isEmploye = roleEmploye.classList.contains('active');
            const btn = document.getElementById('login-btn');

            btn.classList.add('loading');

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;

                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) throw new Error("Compte introuvable dans la base de données.");

                const data = userSnap.data();
                
                if (isEmploye) {
                    // Connexion en tant qu'employé
                    if (data.role === 'proprietaire') {
                        throw new Error("Vous êtes propriétaire. Sélectionnez l'onglet 'Propriétaire'.");
                    }
                    // Vérification du code restaurant pour tous les employés
                    if (data.codeRestaurant !== code) {
                        throw new Error("Le code restaurant est invalide.");
                    }
                    // Redirection dynamique selon le rôle de l'employé
                    const dashboardUrl = getDashboardUrl(data.role);
                    showToast(`Connexion en tant que ${data.role} réussie.`, "success");
                    window.location.href = dashboardUrl;
                } else {
                    // Connexion en tant que propriétaire
                    if (data.role !== 'proprietaire') {
                        throw new Error("Vous êtes enregistré comme employé. Veuillez changer d'onglet.");
                    }
                    showToast("Bon retour Propriétaire !", "success");
                    window.location.href = getDashboardUrl('proprietaire');
                }
            } catch (err) {
                await signOut(auth); 
                showToast(err.message || "Identifiants incorrects.", "error");
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
